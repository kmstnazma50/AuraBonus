<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>✨ EXCLUSIVE REWARDS | 10 Premium Offers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 30% 70%, #0d0e1a, #03020a);
      font-family: 'Inter', system-ui, sans-serif;
      padding: 2rem 1.5rem;
      min-height: 100vh;
    }

    .main-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }

    /* LEFT CONTENT AREA */
    .content-area {
      flex: 3;
      min-width: 250px;
    }

    /* RIGHT SIDEBAR WITH 3 LEVEL BUTTONS */
    .level-sidebar {
      flex: 0.8;
      min-width: 170px;
      position: sticky;
      top: 2rem;
      align-self: flex-start;
      background: rgba(18, 16, 38, 0.8);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      padding: 1.5rem 1rem;
      border: 1px solid rgba(168, 85, 247, 0.5);
      height: fit-content;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .level-sidebar h3 {
      color: #d9c6ff;
      font-size: 1.2rem;
      text-align: center;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .level-sidebar h3 i {
      color: #a855f7;
    }

    .level-btn {
      width: 100%;
      background: linear-gradient(105deg, #1e1838, #140f2a);
      border: 1px solid #7e22ce;
      border-radius: 60px;
      padding: 12px 0;
      margin-bottom: 1rem;
      text-align: center;
      font-weight: 700;
      font-size: 1rem;
      color: #e9d5ff;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .level-btn i {
      font-size: 1.1rem;
      color: #a855f7;
    }

    .level-btn:hover {
      background: linear-gradient(105deg, #2a2248, #1e1738);
      border-color: #c084fc;
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.4);
    }

    .level-btn.active {
      background: linear-gradient(105deg, #9333ea, #7e22ce);
      border-color: #d8b4fe;
      color: white;
      box-shadow: 0 0 14px rgba(147, 51, 234, 0.6);
    }

    .level-btn.active i {
      color: #f3e8ff;
    }

    /* hero section */
    .hero {
      text-align: center;
      margin-bottom: 2rem;
    }

    .hero h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #c084fc, #a855f7, #d946ef);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .hero h1 i {
      background: none;
      -webkit-text-fill-color: #c084fc;
      font-size: 2rem;
    }

    .hero p {
      color: #a0a0c0;
      margin-top: 8px;
      font-weight: 500;
    }

    /* stats card */
    .stats-card {
      background: rgba(20, 18, 40, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1rem 1.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 2rem;
      border: 1px solid rgba(168, 85, 247, 0.4);
    }

    .total-box {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #e9d5ff;
      font-weight: 600;
    }

    .total-box i {
      font-size: 2rem;
      color: #c084fc;
    }

    .total-number {
      background: #0c0a1c;
      padding: 6px 20px;
      border-radius: 50px;
      font-size: 2rem;
      font-weight: 800;
      color: #d8b4fe;
      font-family: monospace;
      letter-spacing: 2px;
      border: 1px solid #a855f7;
    }

    .legend {
      display: flex;
      gap: 20px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: #c4b5fd;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #2d2a4a;
    }

    .dot.active {
      background: #10b981;
      box-shadow: 0 0 6px #34d399;
    }

    /* dynamic section title */
    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.5rem 0 1rem 0;
      padding-bottom: 6px;
      border-bottom: 2px solid rgba(168, 85, 247, 0.5);
    }

    .section-title i {
      font-size: 1.5rem;
      color: #c084fc;
    }

    .section-title h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f0e6ff;
    }

    .badge {
      background: #d946ef;
      padding: 2px 12px;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #0a0a1a;
    }

    /* button grid */
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      max-height: 60vh;
      overflow-y: auto;
      padding-right: 8px;
    }

    .btn-grid::-webkit-scrollbar {
      width: 6px;
    }

    .btn-grid::-webkit-scrollbar-track {
      background: #1e1a3a;
      border-radius: 10px;
    }

    .btn-grid::-webkit-scrollbar-thumb {
      background: #a855f7;
      border-radius: 10px;
    }

    .offer-btn {
      background: linear-gradient(105deg, #181536, #100e28);
      border: 1px solid #3b3566;
      border-radius: 60px;
      padding: 12px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      text-decoration: none;
      transition: all 0.25s ease;
      color: #ded9ff;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .offer-btn:hover {
      transform: translateY(-3px);
      background: linear-gradient(105deg, #211d48, #161338);
      border-color: #c084fc;
      box-shadow: 0 8px 18px rgba(0,0,0,0.4);
    }

    .btn-left {
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
    }

    .btn-left i {
      font-size: 1.2rem;
      color: #c084fc;
      min-width: 28px;
      text-align: center;
    }

    .btn-left span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .click-count {
      background: #00000055;
      border-radius: 40px;
      padding: 3px 12px;
      font-size: 0.8rem;
      font-weight: 800;
      color: #d8b4fe;
      border: 0.5px solid #a855f7;
      font-family: monospace;
    }

    .offer-btn.clicked {
      background: linear-gradient(105deg, #0f3b2a, #0a261c);
      border-color: #10b981;
    }

    .offer-btn.clicked .click-count {
      background: #064e3b;
      color: #facc15;
    }

    .reset-btn {
      background: rgba(168, 85, 247, 0.15);
      border: 1px solid #a855f7;
      border-radius: 50px;
      padding: 6px 18px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #d8b4fe;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .reset-btn:hover {
      background: #a855f730;
      color: #ffffff;
      border-color: #c084fc;
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      color: #6b6a8a;
      font-size: 0.75rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    @media (max-width: 850px) {
      .main-container { flex-direction: column; }
      .level-sidebar {
        position: static;
        width: 100%;
        display: flex;
        gap: 12px;
        flex-direction: row;
        justify-content: center;
        flex-wrap: wrap;
      }
      .level-btn { width: auto; padding: 10px 24px; margin-bottom: 0; }
      .btn-grid { max-height: 50vh; }
    }
  </style>
</head>
<body>
<div class="main-container">
  <!-- LEFT : DYNAMIC CONTENT -->
  <div class="content-area">
    <div class="hero">
      <h1><i class="fas fa-crown"></i> REWARD PORTAL <i class="fas fa-gem"></i></h1>
      <p>10 Live Deals · 3 Exclusive Tiers · Claim Instantly</p>
    </div>

    <div class="stats-card">
      <div class="total-box">
        <i class="fas fa-chart-line"></i>
        <span>Total Clicks</span>
        <div class="total-number" id="totalClicks">0</div>
      </div>
      <div class="legend">
        <span><i class="dot"></i> Pending</span>
        <span><i class="dot active"></i> Clicked</span>
      </div>
    </div>

    <!-- Dynamic header & grid -->
    <div class="section-title" id="dynamicSectionTitle">
      <i class="fas fa-layer-group"></i>
      <h2 id="levelName">Tier 1 · Spark Pack</h2>
      <div class="badge" id="levelBadge">Active</div>
    </div>
    <div id="offersGrid" class="btn-grid"></div>

    <footer>
      <span><i class="far fa-clock"></i> 10 Offers · Tier System Active</span>
      <div class="reset-btn" id="resetAllBtn"><i class="fas fa-trash-alt"></i> Reset Counters</div>
    </footer>
  </div>

  <!-- RIGHT : 3 TIER BUTTONS (STICKY) -->
  <div class="level-sidebar">
    <h3><i class="fas fa-layer-group"></i> Choose Tier</h3>
    <div class="level-btn" data-level="1">
      <i class="fas fa-star"></i> TIER 1
    </div>
    <div class="level-btn" data-level="2">
      <i class="fas fa-gem"></i> TIER 2
    </div>
    <div class="level-btn" data-level="3">
      <i class="fas fa-crown"></i> TIER 3
    </div>
  </div>
</div>

<script>
  // ==================== 10 NEW LINKS ====================
  const ALL_LINKS = [
    "https://www.effectivecpmnetwork.com/b53nc49c?key=3ceca01faef70223f6ddfde0afe67199",
    "https://www.effectivecpmnetwork.com/s98xbjrrzc?key=5052896e402d523093d55ec8b559ef2c",
    "https://www.effectivecpmnetwork.com/bs4juq07?key=22df62839c2360dbf3b890be27d849c6",
    "https://www.effectivecpmnetwork.com/y4hjn6dryn?key=8a52dded61713d04a7a0d11748edc5d0",
    "https://www.effectivecpmnetwork.com/ft2sehevk?key=9e23d1362ccb466f8e0a52e931fc69ab",
    "https://www.effectivecpmnetwork.com/dxvzu71qi9?key=da97c2aebda76295d8569ed722922bfd",
    "https://www.effectivecpmnetwork.com/iqhpr5du?key=453ed0fce5db7a3dc6c8e188a2094f11",
    "https://www.effectivecpmnetwork.com/id0bp4auwj?key=61650d01845502728312d850273979a4",
    "https://www.effectivecpmnetwork.com/ag60q2nesd?key=77605d56d9a4669a612e82e712ebdfca",
    "https://www.effectivecpmnetwork.com/ww4mjjb2cg?key=503eaa2aba42a4929244e2444b3b69df"
  ];

  // TIER CONFIGURATION: 3 tiers (1->3 offers, 2->3 offers, 3->4 offers)
  const TIER_OFFERS = {
    1: [
      { name: "⚡ Voltage Rush", icon: "bolt", link: ALL_LINKS[0] },
      { name: "🚀 Orbit Jump", icon: "rocket", link: ALL_LINKS[1] },
      { name: "🎁 Mystic Box", icon: "gift", link: ALL_LINKS[2] }
    ],
    2: [
      { name: "👑 Shadow Crown", icon: "crown", link: ALL_LINKS[3] },
      { name: "📱 Nova Ultra", icon: "mobile-alt", link: ALL_LINKS[4] },
      { name: "🏎️ Turbo Drift", icon: "car", link: ALL_LINKS[5] }
    ],
    3: [
      { name: "💎 Prism Gem", icon: "gem", link: ALL_LINKS[6] },
      { name: "₿ Crypto Pulse", icon: "bitcoin", link: ALL_LINKS[7] },
      { name: "🪙 Golden Sigil", icon: "coins", link: ALL_LINKS[8] },
      { name: "🌌 Astral Key", icon: "star", link: ALL_LINKS[9] }
    ]
  };

  const TOTAL_OFFERS = 10;
  let clickCounts = new Array(TOTAL_OFFERS).fill(0);
  const STORAGE_KEY = "rewardPortalTracker";

  function getGlobalIndex(tier, localIdx) {
    let idx = 0;
    for (let t = 1; t < tier; t++) {
      idx += TIER_OFFERS[t].length;
    }
    return idx + localIdx;
  }

  function loadCounts() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        let arr = JSON.parse(saved);
        if (arr.length === TOTAL_OFFERS) clickCounts = arr;
      } catch(e) {}
    }
  }

  function saveCounts() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(clickCounts));
  }

  function updateTotalDisplay() {
    const total = clickCounts.reduce((a,b) => a+b, 0);
    document.getElementById("totalClicks").innerText = total;
  }

  let currentTier = 1;

  function renderCurrentTier() {
    const gridContainer = document.getElementById("offersGrid");
    gridContainer.innerHTML = "";
    const offers = TIER_OFFERS[currentTier];
    const levelTitle = document.getElementById("levelName");
    const levelBadge = document.getElementById("levelBadge");

    if (currentTier === 1) {
      levelTitle.innerText = "Tier 1 · Spark Pack";
      levelBadge.innerText = "3 Offers";
    } else if (currentTier === 2) {
      levelTitle.innerText = "Tier 2 · Elite Vault";
      levelBadge.innerText = "Premium";
    } else {
      levelTitle.innerText = "Tier 3 · Legendary Hoard";
      levelBadge.innerText = "Ultimate";
    }

    offers.forEach((offer, localIdx) => {
      const globalIdx = getGlobalIndex(currentTier, localIdx);
      const count = clickCounts[globalIdx];
      const isClicked = count > 0;
      const btn = document.createElement("a");
      btn.href = offer.link;
      btn.target = "_blank";
      btn.rel = "noopener noreferrer";
      btn.className = "offer-btn" + (isClicked ? " clicked" : "");
      btn.setAttribute("data-global-idx", globalIdx);

      btn.innerHTML = `
        <div class="btn-left">
          <i class="fas fa-${offer.icon}"></i>
          <span>${offer.name}</span>
        </div>
        <div class="click-count">${count}</div>
      `;

      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        clickCounts[globalIdx] += 1;
        saveCounts();
        updateTotalDisplay();
        renderCurrentTier();
      });

      gridContainer.appendChild(btn);
    });
  }

  function setActiveTier(tier) {
    currentTier = tier;
    document.querySelectorAll(".level-btn").forEach(btn => {
      const btnTier = parseInt(btn.getAttribute("data-level"));
      if (btnTier === tier) {
        btn.classList.add("active");
      } else {
        btn.classList.remove("active");
      }
    });
    renderCurrentTier();
  }

  function resetCounters() {
    for (let i = 0; i < TOTAL_OFFERS; i++) clickCounts[i] = 0;
    saveCounts();
    updateTotalDisplay();
    renderCurrentTier();
  }

  document.querySelectorAll(".level-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const tier = parseInt(btn.getAttribute("data-level"));
      setActiveTier(tier);
    });
  });

  document.getElementById("resetAllBtn").addEventListener("click", resetCounters);

  loadCounts();
  setActiveTier(1);
  updateTotalDisplay();
</script>
</body>
</html>
