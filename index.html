    }

    .content-area {

      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .level-sidebar h3 i {
      color: #fb923c;
    }

    .triggers-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .level-btn {

      justify-content: center;

    .level-btn i {

      color: #fb923c;
    }

    .level-btn:hover {

    .hero h1 {

      background-clip: text;
      color: transparent;

      display: inline-flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .hero h1 i {

    }

    .stats-card {

    .total-box {
      display: flex;

      gap: 12px;
      color: #fcd9b6;
      font-weight: 600;
    }

    .total-box i {
      font-size: 2rem;
      color: #fb923c;
    }

    .total-number {
      background: #0a0e20;
      padding: 6px 20px;
      border-radius: 50px;
      font-size: 2rem;
      font-weight: 800;
      color: #fb923c;
      font-family: monospace;
      letter-spacing: 2px;
      border: 1px solid #f97316;
    }

    .legend {
      display: flex;
      gap: 20px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: #cbd5e1;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #2d3a5e;
    }

    .dot.active {
      background: #10b981;
      box-shadow: 0 0 6px #34d399;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.5rem 0 1rem 0;
      padding-bottom: 6px;
      border-bottom: 2px solid rgba(249, 115, 22, 0.5);
    }

    .section-title i {

      color: #fb923c;
    }

    .section-title h2 {

      font-weight: 700;
      color: #fee3c0;
    }

    .badge {

      padding: 2px 12px;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #0a0a1a;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      max-height: 50vh;
      overflow-y: auto;
      padding-right: 8px;
    }

    .btn-grid::-webkit-scrollbar {
      width: 6px;
    }
    .btn-grid::-webkit-scrollbar-track {
      background: #1e253e;
      border-radius: 10px;
    }
    .btn-grid::-webkit-scrollbar-thumb {
      background: #fb923c;
      border-radius: 10px;
    }

    .offer-btn {
      background: linear-gradient(105deg, #13182e, #0c1022);
      border: 1px solid #3b3f66;
      border-radius: 60px;
      padding: 12px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      text-decoration: none;
      transition: all 0.25s ease;
      color: #e2e8f0;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;

    .offer-btn:hover {
      transform: translateY(-3px);
      background: linear-gradient(105deg, #1c2340, #12172e);
      border-color: #fb923c;
      box-shadow: 0 8px 18px rgba(0,0,0,0.4);
    }

    .offer-btn.disabled {
      opacity: 0.6;
      cursor: not-allowed;
      pointer-events: none;
      background: linear-gradient(105deg, #1a2a1a, #0f1f0f);
      border-color: #4a6a4a;
      transform: none;
    }

    .btn-left {
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
    }
    .btn-left i {
      font-size: 1.2rem;
      color: #fb923c;
      min-width: 28px;
      text-align: center;
    }
    .btn-left span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .click-count {
      background: #00000055;
      border-radius: 40px;
      padding: 3px 12px;
      font-size: 0.8rem;
      font-weight: 800;
      color: #fdba74;
      border: 0.5px solid #fb923c;
      font-family: monospace;
    }
    .offer-btn.clicked {
      background: linear-gradient(105deg, #0f3b2a, #0a261c);
      border-color: #10b981;
    }
    .offer-btn.clicked .click-count {
      background: #064e3b;
      color: #facc15;
    }

    .reset-btn {
      background: rgba(249, 115, 22, 0.15);
      border: 1px solid #f97316;
      border-radius: 50px;
      padding: 6px 18px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #fdba74;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .reset-btn:hover {
      background: #f9731630;
      color: #ffffff;
      border-color: #fb923c;

    footer {
      margin-top: 1.5rem;
      text-align: center;
      color: #6b7280;
      font-size: 0.75rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    @media (max-width: 850px) {
      .main-container { flex-direction: column; }
      .level-sidebar { display: none; }
      .mobile-tier-bar {
        display: block;
        background: rgba(15, 20, 35, 0.85);
        backdrop-filter: blur(16px);
        border-radius: 1.5rem;
        padding: 1rem;
        margin-bottom: 1.5rem;
        border: 1px solid rgba(251, 146, 60, 0.5);
      }
      .mobile-tier-bar h3 {
        color: #ffd6a5;
        font-size: 1rem;
        text-align: center;
        margin-bottom: 0.8rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .mobile-triggers {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
      }
      .mobile-tier-btn {
        background: linear-gradient(105deg, #1a1e32, #11152a);
        border: 1px solid #fb923c;
        border-radius: 60px;
        padding: 6px 0;
        font-weight: 700;
        font-size: 0.65rem;
        color: #ffdead;
        cursor: pointer;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }
      .mobile-tier-btn i { font-size: 0.65rem; color: #fb923c; }
      .mobile-tier-btn.active {
        background: linear-gradient(105deg, #ea580c, #c2410c);
        border-color: #fdba74;
        color: white;
      }
      .btn-grid { max-height: 45vh; }
      .stats-card { margin-top: 1.5rem; }
    }
    @media (min-width: 851px) {
      .mobile-tier-bar { display: none; }
    }
  </style>
</head>
<body>

<script>
  // ==================== 30 NEW LINKS (glamourpicklessteward.com) ====================
  const ALL_LINKS = [

    "https://glamourpicklessteward.com/cr9dbuwwn?key=a995871d39080bd67e8fa431d3c46d7a",
    "https://glamourpicklessteward.com/in4j06m4f?key=9313a0ec43367e52393485c25a9275aa",
    "https://glamourpicklessteward.com/qcwxq534?key=8aca406a56983fd3c3ab4f2c9dd22e51",
    "https://glamourpicklessteward.com/dtd532kyu?key=24fd0cfe4bce6671ac318742509de0d5",
    "https://glamourpicklessteward.com/dfststrwv?key=cc128d007255d65d3b2737caf3c9e6be",
    "https://glamourpicklessteward.com/h9ce264xg9?key=2de6231645901c51bc99b3c2f7cc4537",
    "https://glamourpicklessteward.com/qdnswi8kzz?key=27b87bbd8e010ef790f7e01bd268adbb",
    "https://glamourpicklessteward.com/kkdcg82iy?key=6f3e11d51f7e464669c2ad3c54d39eb0",
    "https://glamourpicklessteward.com/tj1y3m0i9?key=44c8de1ba16bab7753482583b8e60d7e",
    "https://glamourpicklessteward.com/wes9uvri?key=b8af60474027cbc25e85238e1be14d7b",
    "https://glamourpicklessteward.com/gwgj32s0?key=3c713638560f36559fa3e4e2c0e47832",
    "https://glamourpicklessteward.com/b40rf0s0?key=9242fa05736f2602328d52d06ce0a9b5",
    "https://glamourpicklessteward.com/z50gvxz4t?key=d17b0b9df19c06ca467812e7366b7234",
    "https://glamourpicklessteward.com/uiui9hai3r?key=d17c0f232760d3eb512bcd61d3289463"
  ];

  // ========== USER-FRIENDLY & AD-COMPLIANT OFFER NAMES (30 unique) ==========
  const OFFER_NAMES = [
    "🌟 Daily Aura Gift", "🎁 Gentle Bonus Pack", "💎 Soft Touch Reward", "⚡ Easy Access Pass", "🍀 Lucky Leaf Token",
    "🏆 Kind Achievement", "🚀 Smooth Boost", "🎯 Friendly Bonus", "🔑 Quiet Vault Key", "📀 Simple Digital Crate",
    "🕹️ Calm Gamer Perk", "🎧 Gentle Audio Pack", "📱 Light Mobile Boost", "💡 Bright Simple Deal", "🛡️ Cozy Secure Vault",
    "📚 Warm Insider Access", "🎨 Kind Creator Kit", "⚙️ Easy Utility Upgrade", "🔔 Gentle Flash Alert", "🌐 Soft Global Perks",
    "🧩 Friendly Mystery Tile", "🎵 Calm Sound Pack", "📸 Soft Snapshot", "🕶️ Gentle Stealth Perk", "🌿 Pure Lucky Clover",
    "🧭 Kind Navigator", "🎲 Simple Dice Roll", "🃏 Gentle Wild Card", "🎈 Soft Celebration", "⭐ Pure Aura Bonus"
  ];

  // Matching icons for each offer
  const OFFER_ICONS = [
    "star", "gift", "gem", "bolt", "leaf", "trophy", "rocket", "bullseye", "key", "database",
    "gamepad", "headphones", "mobile-alt", "lightbulb", "shield-alt", "book", "palette", "cogs", "bell", "globe",
    "puzzle-piece", "music", "camera", "sunglasses", "leaf", "compass", "dice-d6", "star-of-life", "balloon", "crown"
  ];

  // Shuffle array utility (Fisher-Yates) for unique order per user
  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // Get persistent shuffled order for this user
  function getShuffledIndices() {
    const ORDER_KEY = "auraBonusShuffledOrderV1";
    const saved = localStorage.getItem(ORDER_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed.length === 30) return parsed;
    }
    const indices = Array.from({ length: 30 }, (_, i) => i);
    shuffleArray(indices);
    localStorage.setItem(ORDER_KEY, JSON.stringify(indices));
    return indices;
  }

  const shuffledOrder = getShuffledIndices();

  // Build tier offers using shuffled order (3 per tier)
  const TIER_OFFERS = {};
  for (let tier = 1; tier <= 10; tier++) {
    TIER_OFFERS[tier] = [];
    for (let j = 0; j < 3; j++) {
      const globalIdx = shuffledOrder[(tier - 1) * 3 + j];
      TIER_OFFERS[tier].push({
        name: OFFER_NAMES[globalIdx % OFFER_NAMES.length],
        icon: OFFER_ICONS[globalIdx % OFFER_ICONS.length],
        link: ALL_LINKS[globalIdx],
        originalIndex: globalIdx
      });
    }
  }

  const TOTAL_OFFERS = 30;
  let clickCounts = new Array(TOTAL_OFFERS).fill(0);
  let claimedStatus = new Array(TOTAL_OFFERS).fill(false);
  const STORAGE_KEY = "auraBonusClicksV1";
  const CLAIMED_KEY = "auraBonusClaimedV1";

  function loadCounts() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        let arr = JSON.parse(saved);
        if (arr.length === TOTAL_OFFERS) clickCounts = arr;
      } catch(e) {}
    }
    const savedClaimed = localStorage.getItem(CLAIMED_KEY);
    if (savedClaimed) {
      try {
        let arr = JSON.parse(savedClaimed);
        if (arr.length === TOTAL_OFFERS) claimedStatus = arr;
      } catch(e) {}
    }
  }
  function saveCounts() { 
    localStorage.setItem(STORAGE_KEY, JSON.stringify(clickCounts));
    localStorage.setItem(CLAIMED_KEY, JSON.stringify(claimedStatus));
  }
  function updateTotalDisplay() {
    const total = clickCounts.reduce((a,b)=>a+b,0);
    document.getElementById("totalClicks").innerText = total;
  }

  let currentTier = 1;

  function renderCurrentTier() {
    const grid = document.getElementById("offersGrid");
    grid.innerHTML = "";
    const offers = TIER_OFFERS[currentTier];
    const tierNames = ["Starter Pack", "Bronze Tier", "Silver Tier", "Gold Tier", "Platinum Tier", "Emerald Tier", "Ruby Tier", "Sapphire Tier", "Diamond Tier", "Ultimate Vault"];
    const levelTitle = document.getElementById("levelName");
    const levelBadge = document.getElementById("levelBadge");
    levelTitle.innerText = `Tier ${currentTier} · ${tierNames[currentTier-1]}`;
    levelBadge.innerText = "3 Offers";

    offers.forEach((offer) => {
      const globalIdx = offer.originalIndex;
      const count = clickCounts[globalIdx];
      const isClaimed = claimedStatus[globalIdx];
      const hasClick = count > 0;
      
      const btn = document.createElement("a");
      if (!isClaimed) {
        btn.href = offer.link;
        btn.target = "_blank";
        btn.rel = "noopener noreferrer";
      } else {
        btn.href = "javascript:void(0);";
      }
      btn.className = `offer-btn ${hasClick ? "clicked" : ""} ${isClaimed ? "disabled" : ""}`;
      btn.setAttribute("data-global", globalIdx);
      
      btn.innerHTML = `<div class="btn-left"><i class="fas fa-${offer.icon}"></i><span>${offer.name}</span></div><div class="click-count">${count}</div>`;
      
      if (!isClaimed) {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (claimedStatus[globalIdx]) return false;
          
          // One-time claim: mark claimed and increment
          claimedStatus[globalIdx] = true;
          clickCounts[globalIdx] += 1;
          saveCounts();
          updateTotalDisplay();
          renderCurrentTier();  // re-render to disable this button
          
          // Open link in new tab
          window.open(offer.link, "_blank");
          return false;
        });
      } else {
        btn.style.cursor = "not-allowed";
        btn.onclick = (e) => { e.preventDefault(); return false; };
      }
      
      grid.appendChild(btn);
    });
  }

  function setActiveTier(tier) {
    currentTier = tier;
    document.querySelectorAll(".level-btn").forEach(btn => {
      if (parseInt(btn.getAttribute("data-level")) === tier) btn.classList.add("active");
      else btn.classList.remove("active");
    });
    document.querySelectorAll(".mobile-tier-btn").forEach(btn => {
      if (parseInt(btn.getAttribute("data-level")) === tier) btn.classList.add("active");
      else btn.classList.remove("active");
    });
    renderCurrentTier();
  }

  function resetCounters() {
    for (let i = 0; i < TOTAL_OFFERS; i++) {
      clickCounts[i] = 0;
      claimedStatus[i] = false;
    }
    saveCounts();
    updateTotalDisplay();
    renderCurrentTier();
  }

  function buildTriggers() {
    const desktopContainer = document.getElementById("desktopTriggers");
    const mobileContainer = document.getElementById("mobileTriggers");
    desktopContainer.innerHTML = "";
    mobileContainer.innerHTML = "";
    for (let i = 1; i <= 10; i++) {
      const dBtn = document.createElement("div");
      dBtn.className = "level-btn";
      dBtn.setAttribute("data-level", i);
      dBtn.innerHTML = `<i class="fas fa-tag"></i> ${i}`;
      dBtn.addEventListener("click", () => setActiveTier(i));
      desktopContainer.appendChild(dBtn);
      const mBtn = document.createElement("div");
      mBtn.className = "mobile-tier-btn";
      mBtn.setAttribute("data-level", i);
      mBtn.innerHTML = `<i class="fas fa-tag"></i> ${i}`;
      mBtn.addEventListener("click", () => setActiveTier(i));
      mobileContainer.appendChild(mBtn);
    }
  }

  document.getElementById("resetAllBtn").addEventListener("click", resetCounters);
  loadCounts();
  buildTriggers();
  setActiveTier(1);
  updateTotalDisplay();
</script>
</body>
</html>
